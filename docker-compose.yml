# ==============================================================
# SnapChart — 生产环境 Docker Compose (SSR 架构)
# 服务：ssr-service (ECharts SSR) + backend (FastAPI) + frontend (Nginx)
#
# 架构：
#   Client → Nginx(80) → FastAPI(8000) → Node SSR(3100) → SVG → Cairo → PNG
#
# 部署：
#   1. 复制 backend/.env.example → backend/.env
#   2. docker-compose up -d --build
# ==============================================================

services:

  # ---- ECharts SSR 渲染引擎（~80MB，极速出图） ----
  ssr-service:
    build:
      context: ./ssr-service
      dockerfile: Dockerfile
    container_name: snapchart-ssr
    restart: unless-stopped
    expose:
      - "3100"
    networks:
      - snapchart-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3100/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ---- 后端服务（~250MB，鉴权+扣费+SVG→PNG） ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: snapchart-backend
    restart: unless-stopped
    environment:
      ENVIRONMENT: "dev"
      CORS_ORIGINS: "http://localhost,http://your-domain.com"
      FRONTEND_BASE_URL: "http://your-domain.com"
      AGENT_API_KEY: "change-me-in-production"
      SSR_SERVICE_URL: "http://ssr-service:3100"
      APP_HOST: "0.0.0.0"
      APP_PORT: "8000"
      MAX_FILE_SIZE_MB: "20"
      DATABASE_URL: "sqlite+aiosqlite:////app/data/styles.db"
      UPLOAD_DIR: "/app/uploads"
    volumes:
      - ./backend/data:/app/data
      - ./backend/uploads:/app/uploads
    networks:
      - snapchart-net
    expose:
      - "8000"
    depends_on:
      ssr-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ---- 前端服务（Nginx + React SPA） ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: snapchart-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - snapchart-net
    depends_on:
      backend:
        condition: service_healthy

networks:
  snapchart-net:
    driver: bridge
