version: "3.9"

# ==============================================================
# SnapChart — 生产环境服务编排
# 服务：backend (FastAPI) + frontend (Nginx + React)
# ==============================================================

services:

  # ---- 后端服务 ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: snapchart-backend
    restart: unless-stopped
    environment:
      # ⚠️ 生产环境必须修改的变量 ↓
      CORS_ORIGINS: "http://localhost,http://your-domain.com"   # 改为实际域名
      # 可选覆盖项（有默认值，按需调整）
      APP_HOST: "0.0.0.0"
      APP_PORT: "8000"
      MAX_FILE_SIZE_MB: "20"
      DATABASE_URL: "sqlite+aiosqlite:////app/data/styles.db"
      UPLOAD_DIR: "/app/uploads"
    volumes:
      # 持久化 SQLite 数据库和上传文件，防止容器重建数据丢失
      - snapchart-db:/app/data
      - snapchart-uploads:/app/uploads
    networks:
      - snapchart-net
    # 后端不对外暴露端口；所有流量经由 Nginx 代理进入
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ---- 前端服务 ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: snapchart-frontend
    restart: unless-stopped
    ports:
      - "80:80"     # ⚠️ 如需 HTTPS，改为在此前加 Nginx/Caddy 反代，或改用 443
    networks:
      - snapchart-net
    depends_on:
      backend:
        condition: service_healthy

# ---- 持久化卷 ----
volumes:
  snapchart-db:       # SQLite 数据库文件
  snapchart-uploads:  # 用户上传的原始文件

# ---- 内部网络 ----
networks:
  snapchart-net:
    driver: bridge
