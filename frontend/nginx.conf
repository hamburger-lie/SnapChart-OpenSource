server {
    listen 80;
    server_name _;

    # 静态文件根目录（Vite 构建产物）
    root /usr/share/nginx/html;
    index index.html;

    # -----------------------------------------------
    # 安全响应头
    # -----------------------------------------------
    add_header X-Content-Type-Options  "nosniff"         always;
    add_header X-Frame-Options         "SAMEORIGIN"      always;
    add_header X-XSS-Protection        "1; mode=block"   always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'" always;

    # 启用 gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # -----------------------------------------------
    # 【关键】后端 API 反向代理
    # 容器名 "backend" 由 docker-compose 的 service 名决定
    # -----------------------------------------------
    location /api/ {
        proxy_pass         http://backend:8000/api/;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # 文件上传超时
        proxy_read_timeout    120s;
        proxy_connect_timeout 10s;
        client_max_body_size  25m;
    }

    # -----------------------------------------------
    # 【关键】SPA 路由兜底：所有非文件请求回退到 index.html
    # 保证 /share/:uuid 等前端路由在刷新时不会 404
    # -----------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源长缓存（Vite 构建产物带 hash，可安全缓存）
    location ~* \.(js|css|png|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
